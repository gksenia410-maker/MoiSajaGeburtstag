<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Level 1 – Puzzle</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      background: url("Meer.png") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.55);
      padding: 30px 40px;
      border-radius: 16px;
      max-width: 700px;
      text-align: center;
    }

    #puzzle {
      width: 500px;
      height: 500px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
      margin: 20px auto;
    }

    .piece {
      width: 100px;
      height: 100px;
      background-image: url("Level1.jpeg");
      background-size: 500px 500px;
      cursor: pointer;
      border: 1px solid #ffffff55;
    }

    #wrong {
      display: none;
      color: #ffb3b3;
      margin-top: 10px;
      font-size: 18px;
    }

    #checkBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background-color: #4da6ff;
      color: white;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Level 1 – Puzzle</h1>
    <p>Setze das Bild richtig zusammen und drücke dann auf „Fertig“!</p>

    <div id="puzzle"></div>

    <button id="checkBtn">Fertig</button>

    <div id="wrong">Das Puzzle ist noch nicht richtig!</div>
  </div>

  <script>
  alert("JavaScript funktioniert!");
  </script>


</body>
</html>
