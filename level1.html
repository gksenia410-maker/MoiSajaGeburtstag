<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Level 1 – Puzzle</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      background: url("Meer.png") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.55);
      padding: 30px 40px;
      border-radius: 16px;
      max-width: 700px;
      text-align: center;
    }

    #puzzle {
      width: 500px;
      height: 500px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
      margin: 20px auto;
    }

    .piece {
      width: 100px;
      height: 100px;
      background-image: url("Level1.jpeg");
      background-size: 500px 500px;
      cursor: pointer;
      border: 1px solid #ffffff55;
    }

    #wrong {
      display: none;
      color: #ffb3b3;
      margin-top: 10px;
      font-size: 18px;
    }

    #checkBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background-color: #4da6ff;
      color: white;
    }

    #codeInput {
      margin-top: 20px;
      padding: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      width: 200px;
      display: none;
    }

    #submitCode {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background-color: #4da6ff;
      color: white;
      display: none;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Level 1 – Puzzle</h1>
    <p>Setze das Bild richtig zusammen und drücke dann auf „Fertig“!</p>

    <div id="puzzle"></div>

    <button id="checkBtn">Fertig</button>

    <input id="codeInput" placeholder="Codewort eingeben">
    <button id="submitCode">Weiter</button>

    <div id="wrong">Das Codewort ist falsch!</div>
  </div>

  <script>
    const puzzle = document.getElementById("puzzle");

    // Puzzle-Teile erzeugen (funktioniert wie vorher)
    const positions = [];
    for (let y = 0; y < 5; y++) {
      for (let x = 0; x < 5; x++) {
        positions.push(`${x * 100}px ${y * 100}px`);
      }
    }

    let pieces = [];
    for (let i = 0; i < 25; i++) {
      const div = document.createElement("div");
      div.classList.add("piece");
      div.style.backgroundPosition = positions[i];
      pieces.push(div);
    }

    pieces.sort(() => Math.random() - 0.5);
    pieces.forEach(p => puzzle.appendChild(p));

    let first = null;
    [...puzzle.children].forEach(piece => {
      piece.addEventListener("click", () => {
        if (!first) {
          first = piece;
          piece.style.outline = "2px solid gold";
        } else {
          const tempPos = first.style.backgroundPosition;
          first.style.backgroundPosition = piece.style.backgroundPosition;
          piece.style.backgroundPosition = tempPos;

          first.style.outline = "none";
          first = null;
        }
      });
    });

    // Codewort-System
    const checkBtn = document.getElementById("checkBtn");
    const codeInput = document.getElementById("codeInput");
    const submitCode = document.getElementById("submitCode");
    const wrong = document.getElementById("wrong");

    checkBtn.addEventListener("click", () => {
      codeInput.style.display = "block";
      submitCode.style.display = "block";
    });

    submitCode.addEventListener("click", () => {
      if (codeInput.value.trim().toLowerCase() === "nordsee") {
        window.location.href = "level2.html";
      } else {
        wrong.style.display = "block";
      }
    });
  </script>

</body>
</html>
